name: Pull Request Check

on:
  pull_request:
    branches: [ main, master ]
    types: [opened, synchronize, reopened]

jobs:
  pr-validation:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: "3.9"

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-pr-${{ hashFiles('**/test-requirements.txt', '**/requirements.txt', '**/setup.py') }}
        restore-keys: |
          ${{ runner.os }}-pip-pr-
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python run_tests.py --install

    - name: Run linting
      run: |
        python run_tests.py --lint

    - name: Run unit tests
      run: |
        python run_tests.py --type unit --verbose

    - name: Run integration tests
      run: |
        python run_tests.py --type integration --verbose

    - name: Check test coverage
      run: |
        python run_tests.py --type all --coverage-report
        
    - name: Comment coverage on PR
      if: github.event_name == 'pull_request'
      uses: py-cov-action/python-coverage-comment-action@v3
      with:
        GITHUB_TOKEN: ${{ github.token }}
        MINIMUM_GREEN: 80
        MINIMUM_ORANGE: 70

    - name: Validate plugin installation
      run: |
        python -c "import octoprint_filamentmotionsensor; print('✅ Plugin imports successfully')"
        python -c "from octoprint_filamentmotionsensor import FilamentMotionSensor; print('✅ Main class imports successfully')"
        python -c "from octoprint_filamentmotionsensor.SensorGPIOThread import MotionSensorGPIOThread; print('✅ GPIO thread imports successfully')"

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: "3.9"

    - name: Install code quality tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort mypy bandit safety

    - name: Run Black code formatter check
      run: |
        black --check --diff octoprint_filamentmotionsensor/ tests/
      continue-on-error: true

    - name: Run isort import organizer check
      run: |
        isort --check-only --diff octoprint_filamentmotionsensor/ tests/
      continue-on-error: true

    - name: Run flake8 linting
      run: |
        flake8 octoprint_filamentmotionsensor/ tests/ --max-line-length=120 --extend-ignore=E203,W503

    - name: Run bandit security check
      run: |
        bandit -r octoprint_filamentmotionsensor/ -f json -o bandit-report.json
      continue-on-error: true

    - name: Run safety dependency check
      run: |
        safety check --json --output safety-report.json
      continue-on-error: true

    - name: Upload security reports
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json

  pr-summary:
    runs-on: ubuntu-latest
    needs: [pr-validation, code-quality]
    if: always()
    
    steps:
    - name: PR Check Summary
      run: |
        echo "## 📋 Pull Request Check Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ needs.pr-validation.result }}" = "success" ]; then
          echo "✅ **Tests**: All tests passed" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Tests**: Some tests failed" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ "${{ needs.code-quality.result }}" = "success" ]; then
          echo "✅ **Code Quality**: All checks passed" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ **Code Quality**: Some issues found (non-blocking)" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🔍 What was checked:" >> $GITHUB_STEP_SUMMARY
        echo "- Unit tests and integration tests" >> $GITHUB_STEP_SUMMARY
        echo "- Code coverage (minimum 80%)" >> $GITHUB_STEP_SUMMARY
        echo "- Code formatting (Black, isort)" >> $GITHUB_STEP_SUMMARY
        echo "- Linting (flake8)" >> $GITHUB_STEP_SUMMARY
        echo "- Security scanning (bandit, safety)" >> $GITHUB_STEP_SUMMARY
        echo "- Plugin import validation" >> $GITHUB_STEP_SUMMARY
        
        # Fail if tests failed
        if [ "${{ needs.pr-validation.result }}" != "success" ]; then
          exit 1
        fi 